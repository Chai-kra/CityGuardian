<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="register-box">
        <form action="">
            <h1>Register</h1>
            <div class="input-box">
                <input type="email" id="email" placeholder="Enter your email" required>
                <i class='bx bxs-envelope' ></i>
            </div>
            <div class="input-box">
                <input type="text" id="username" placeholder="Enter your username" required>
                <i class='bx bxs-user' ></i>
            <div class="input-box">
                <input type="password" id="password" placeholder="Enter your password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>
            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>


            <button type="submit" class="btn" onclick="handleRegister(event)">Register</button>

            <div class="login-link">
                <p>Already have an account? <a href="LogIn.html" class="login-link">Log In</a></p>
            </div>
        </form>
    </div>
</body>

<script>    
function handleRegister(event) {
    event.preventDefault(); // Prevent form submission

    const email = document.getElementById('email').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    // Perform registration logic here (e.g., send data to server for account creation)
    console.log('Email:', email);
    console.log('Username:', username);
    console.log('Password:', password);
    console.log('Confirm Password:', confirmPassword);

    // Example: Redirect to another page after successful registration
    window.location.href = 'LogIn.html';
    
}


</script>

</html>
