<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn Page</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="login-box">
        <form action="">
            <h1>Log In</h1>
            <div class="input-box">
                <input type="email" id="email" placeholder="Enter your email" required>
                <i class='bx bxs-envelope' ></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Enter your password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn" onclick="handleLogin(event)">Log In</button>

            <div class="register-link">
                <p>Don't have an account? <a href="Register.html" class="register-link">Register</a></p>
            </div>
        </form>
    </div>
</body>

<script>    
function handleLogin(event) {
    event.preventDefault(); // Prevent form submission

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Perform login logic here (e.g., send data to server for authentication)
    console.log('Email:', email);
    console.log('Password:', password);

    // Example: Redirect to another page after successful login
    window.location.href = 'ReportPage.html';
    
}

</script>

</html>
