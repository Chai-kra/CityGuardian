<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background-color: #e0e0e0;
}

.container {
    display: grid;

    grid-template-rows: 0.2fr 3fr;
    grid-template-areas: 
        "header"
        "main";
    height: 100vh;
}

.navbar {
    background-color: #1a237e; /* 藏蓝色 */
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.brand {
    font-size: 16px;
    font-weight: bold;
}
.nav-links button {
    background: none;
    border: none;
    color: #b0bec5;
    font-size: 14px;
    margin-left: 20px;
    cursor: pointer;
    padding: 5px 0;
}

.nav-links button.active {
    color: white;
    border-bottom: 2px solid white;
}

.main-container {
    grid-area: main;
    text-align: left;
    text-indent: 20px;
}

.chart {
    align-items: left;
    margin-top: 15px;
    margin-left: 20px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: conic-gradient(
        rgb(113, 255, 113) 0% var(--Solved-classes),
        rgb(123, 123, 255) var(--Solved-classes) calc(var(--Solved-classes) + var(--Urgent-classes)),
        rgb(255, 128, 128) calc(var(--Solved-classes) + var(--Urgent-classes)) 100%

    )
}

.chart-title {
    margin-top: 40px;
    margin-bottom: 5px;
    margin-left: 75px;
    font-size: 18px;
    font-weight: 600;
    color: #000000; 
}

.map-container {
    width: 100%;
    height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

iframe {
    width: 80%;
    height: 500px;
    border: none;
    border-radius: 8px;

}

.report-container{
    margin: 10px;
    padding: 10px;
    background-color: #a7c6ff;
}

</style>

</head>
<body>
 
<div class="container">
    <header class="navbar">
        <div class="brand"> </div>
        <nav class="nav-links">
            <button id="btn-review" class="active" onclick="switchPage('case-review')">Case Review</button>
            <button id="btn-stats" onclick="switchPage('statistics')">Statistics</button>
        </nav> 
    </header>
    <main class="main-container">  
        <div class="map-container">
            <h1>Location Map</h1>  
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d7967.530022559729!2d101.71401304999999!3d3.156548150000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1szh-CN!2smy!4v1783431995204!5m2!1szh-CN!2smy" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>  
        </div>
        <div class="report-container"><h2>Report 1</h2></div>
        <div class="report-container"><h2>Report 2</h2></div>
        <div class="report-container"><h2>Report 3</h2></div>
    </main>

</div>


</div>

</body>

<script>
function switchPage(page) {
    const mainContainer = document.querySelector('.main-container');
    const btnReview = document.getElementById('btn-review');
    const btnStats = document.getElementById('btn-stats');

    // Clear the main container
    mainContainer.innerHTML = ' ';

    // Update button styles
    if (page === 'case-review') {
        btnReview.classList.add('active');
        btnStats.classList.remove('active');
        mainContainer.innerHTML = `
            <div class="map-container">
              <h1 style="margin-top: 0;">Location Map</h1>  
              <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d7967.530022559729!2d101.71401304999999!3d3.156548150000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1szh-CN!2smy!4v1783431995204!5m2!1szh-CN!2smy" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
            </div>
            <div class="report-container"><h2>Report 1</h2></div>
            <div class="report-container"><h2>Report 2</h2></div>
            <div class="report-container"><h2>Report 3</h2></div>
            
            `;
    } else if (page === 'statistics') {
        btnStats.classList.add('active');
        btnReview.classList.remove('active');
        mainContainer.innerHTML = `
            <p class="chart-title">Statistics Pie Chart</p>
            <div class="chart"
                style="
                    --Solved-classes: 25%;
                    --Urgent-classes: 25%;
                    --Warning-classes: 50%;">
            </div>`;
          
    }
}

</script>
</html>
